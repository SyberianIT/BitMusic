name: bitmusic
description: "Music search and download app — search YouTube, download audio, play offline"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # YouTube search & audio streams
  youtube_explode_dart: ^2.2.1

  # Filesystem
  path_provider: ^2.1.3

  # Permissions (Android / iOS)
  permission_handler: ^11.3.1

  # HTTP downloads
  dio: ^5.7.0

  # Audio playback (cross-platform, AndroidEqualizer built-in)
  just_audio: ^0.9.40
  audio_session: ^0.1.21

  # Thumbnail caching
  cached_network_image: ^3.4.1

  # Local metadata storage (no code-gen needed)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # State management
  provider: ^6.1.2

  # Microphone recording (for music recognition)
  record: ^5.0.0

  # Smooth animations
  flutter_animate: ^4.5.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0


flutter:
  uses-material-design: true
  assets:
    - assets/images/
