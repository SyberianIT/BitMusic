name: Build & Release APK

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: stable
          cache: true

      - name: Install NDK and CMake
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.1.8937393" "cmake;3.22.1"

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties
          echo "ndk.dir=$ANDROID_HOME/ndk/25.1.8937393" >> android/local.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build APK (release, split per ABI)
        run: |
          # Flutter 3.29.2 sometimes can't locate APKs after a successful Gradle build
          # when using Kotlin DSL (build.gradle.kts). The APKs ARE built — we collect
          # them manually in the next step regardless of whether Flutter's wrapper exits 0.
          flutter build apk --release --split-per-abi || true

      - name: Build universal APK (release)
        run: flutter build apk --release || true

      - name: Collect APKs
        run: |
          mkdir -p artifacts
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

          echo "=== All APK files found ==="
          find . -name "*.apk" -not -path "*/.git/*" 2>/dev/null | sort

          # Search in every location Gradle or Flutter might use
          find_apk() {
            local name=$1
            for dir in \
              "build/app/outputs/flutter-apk" \
              "build/app/outputs/apk/release" \
              "android/app/build/outputs/apk/release" \
              "android/app/build/outputs/flutter-apk"
            do
              [ -f "${dir}/${name}" ] && echo "${dir}/${name}" && return
            done
            find . -name "${name}" -not -path "*/.git/*" 2>/dev/null | head -1
          }

          ARM64=$(find_apk "app-arm64-v8a-release.apk")
          ARM32=$(find_apk "app-armeabi-v7a-release.apk")
          X64=$(find_apk   "app-x86_64-release.apk")
          UNIVERSAL=$(find_apk "app-release.apk")

          echo "arm64:     ${ARM64:-NOT FOUND}"
          echo "arm32:     ${ARM32:-NOT FOUND}"
          echo "x64:       ${X64:-NOT FOUND}"
          echo "universal: ${UNIVERSAL:-NOT FOUND}"

          [ -n "$ARM64" ]     && cp "$ARM64"     "artifacts/BitMusic-${VERSION}-arm64.apk"
          [ -n "$ARM32" ]     && cp "$ARM32"     "artifacts/BitMusic-${VERSION}-arm32.apk"
          [ -n "$X64" ]       && cp "$X64"       "artifacts/BitMusic-${VERSION}-x64.apk"
          [ -n "$UNIVERSAL" ] && cp "$UNIVERSAL" "artifacts/BitMusic-${VERSION}-universal.apk"

          echo "=== Artifacts directory ==="
          ls -lh artifacts/

          # Fail the job if nothing was collected
          COUNT=$(ls artifacts/*.apk 2>/dev/null | wc -l)
          [ "$COUNT" -gt 0 ] || { echo "ERROR: No APKs collected — build failed entirely."; exit 1; }

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BitMusic-APKs-${{ env.VERSION }}
          path: artifacts/
          retention-days: 30

      # ── Create/update GitHub Release ─────────────────────────────────────
      # On version tags: stable release named v1.x.x
      # On push to main / workflow_dispatch: rolling "latest" pre-release
      - name: Create Release (version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: BitMusic ${{ env.VERSION }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## BitMusic ${{ env.VERSION }}

            ### Скачать APK

            | Файл | Архитектура |
            |------|-------------|
            | `BitMusic-${{ env.VERSION }}-arm64.apk` | ARM 64-bit (большинство современных телефонов) |
            | `BitMusic-${{ env.VERSION }}-arm32.apk` | ARM 32-bit (старые телефоны) |
            | `BitMusic-${{ env.VERSION }}-x64.apk` | x86_64 (эмулятор) |
            | `BitMusic-${{ env.VERSION }}-universal.apk` | Универсальный (все архитектуры) |

            ### Возможности
            - Поиск музыки на YouTube
            - Скачивание аудио (YouTube + SoundCloud, лучшее качество автоматически)
            - Офлайн-плеер с эквалайзером и пресетами
            - Распознавание музыки по звуку (Shazam-стиль)
            - Анимированный спектр-визуализатор
          files: |
            artifacts/BitMusic-${{ env.VERSION }}-arm64.apk
            artifacts/BitMusic-${{ env.VERSION }}-arm32.apk
            artifacts/BitMusic-${{ env.VERSION }}-x64.apk
            artifacts/BitMusic-${{ env.VERSION }}-universal.apk
          draft: false
          prerelease: false

      - name: Create or update rolling "latest" release
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          name: BitMusic latest (автосборка)
          tag_name: latest
          body: |
            ## BitMusic ${{ env.VERSION }} — последняя сборка

            Автоматически собирается с каждым коммитом в `main`.

            ### Скачать APK

            | Файл | Архитектура |
            |------|-------------|
            | `BitMusic-${{ env.VERSION }}-arm64.apk` | ARM 64-bit (**рекомендуется** для большинства телефонов 2017+) |
            | `BitMusic-${{ env.VERSION }}-arm32.apk` | ARM 32-bit (старые телефоны) |
            | `BitMusic-${{ env.VERSION }}-x64.apk` | x86_64 (эмуляторы) |
            | `BitMusic-${{ env.VERSION }}-universal.apk` | Универсальный (все архитектуры, больший размер) |

            > Для установки разрешите "Установку из неизвестных источников" в настройках Android.

            ### Возможности
            - Поиск музыки на YouTube (до 10 результатов)
            - Скачивание: YouTube + SoundCloud, автоматически выбирается лучшее качество
            - Офлайн-плеер с очередью, шаффлом и тремя режимами повтора
            - 5-полосный эквалайзер с 8 пресетами (аппаратный на Android)
            - Распознавание музыки по звуку в стиле Shazam (AudD API)
            - Анимированный спектр-визуализатор
          files: |
            artifacts/BitMusic-${{ env.VERSION }}-arm64.apk
            artifacts/BitMusic-${{ env.VERSION }}-arm32.apk
            artifacts/BitMusic-${{ env.VERSION }}-x64.apk
            artifacts/BitMusic-${{ env.VERSION }}-universal.apk
          draft: false
          prerelease: true
