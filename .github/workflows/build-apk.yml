name: Build & Release APK

on:
  push:
    branches: ['**']
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: stable
          cache: true

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build APK (debug)
        run: flutter build apk --debug --split-per-abi

      - name: Build APK (release)
        run: flutter build apk --release --split-per-abi

      - name: Build universal APK (release)
        run: flutter build apk --release

      - name: Rename APKs
        run: |
          mkdir -p artifacts
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk  artifacts/BitMusic-${VERSION}-arm64.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk artifacts/BitMusic-${VERSION}-arm32.apk
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk     artifacts/BitMusic-${VERSION}-x64.apk
          cp build/app/outputs/flutter-apk/app-release.apk             artifacts/BitMusic-${VERSION}-universal.apk
          cp build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk    artifacts/BitMusic-${VERSION}-arm64-debug.apk
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BitMusic-APKs-${{ env.VERSION }}
          path: artifacts/
          retention-days: 30

      # ── Create GitHub Release on version tag ──────────────────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: BitMusic ${{ env.VERSION }}
          body: |
            ## BitMusic ${{ env.VERSION }}

            ### Скачать APK

            | Файл | Архитектура |
            |------|-------------|
            | `BitMusic-${{ env.VERSION }}-arm64.apk` | ARM 64-bit (большинство современных телефонов) |
            | `BitMusic-${{ env.VERSION }}-arm32.apk` | ARM 32-bit (старые телефоны) |
            | `BitMusic-${{ env.VERSION }}-x64.apk` | x86_64 (эмулятор) |
            | `BitMusic-${{ env.VERSION }}-universal.apk` | Универсальный (все архитектуры) |

            ### Возможности
            - Поиск музыки на YouTube
            - Скачивание аудио (YouTube + SoundCloud, лучшее качество автоматически)
            - Офлайн-плеер с эквалайзером и пресетами
            - Распознавание музыки по звуку (Shazam-стиль)
            - Анимированный спектр-визуализатор
          files: |
            artifacts/BitMusic-${{ env.VERSION }}-arm64.apk
            artifacts/BitMusic-${{ env.VERSION }}-arm32.apk
            artifacts/BitMusic-${{ env.VERSION }}-x64.apk
            artifacts/BitMusic-${{ env.VERSION }}-universal.apk
          draft: false
          prerelease: false
